<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTERE - Find the look. Not the price tag.</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1a1a1a;
            --secondary-color: #f5f5f0;
            --accent-gold: #d4a574;
            --accent-rose: #e6b4b0;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --white: #ffffff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e6e0 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: clamp(1rem, 4vw, 1.25rem);
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .camera-section {
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .camera-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-rose), var(--accent-gold));
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .camera-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--white);
            text-align: center;
            padding: 40px 20px;
        }

        .camera-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            opacity: 0.7;
        }

        .capture-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-rose) 100%);
            border: 4px solid var(--white);
            cursor: pointer;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(212, 165, 116, 0.3);
        }

        .capture-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(212, 165, 116, 0.4);
        }

        .capture-btn:active {
            transform: scale(0.95);
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #333 100%);
            color: var(--white);
            box-shadow: 0 4px 16px rgba(26, 26, 26, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(26, 26, 26, 0.3);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: var(--text-primary);
            border: 2px solid var(--accent-gold);
        }

        .btn-secondary:hover {
            background: var(--accent-gold);
            color: var(--white);
            transform: translateY(-2px);
        }

        .results-section {
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
            display: none;
            animation: slideUp 0.6s ease-out;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--secondary-color);
            border-top: 3px solid var(--accent-gold);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        .dupe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .dupe-item {
            background: var(--secondary-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .dupe-item:hover {
            transform: translateY(-4px);
        }

        .dupe-image {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-rose));
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 500;
        }

        .price {
            font-weight: 600;
            color: var(--accent-gold);
            font-size: 18px;
        }

        .brand {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        .captured-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .camera-section {
                padding: 20px;
                margin-bottom: 20px;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                min-width: 200px;
            }
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element" style="top: 10%; left: 10%; font-size: 2rem;">👗</div>
        <div class="floating-element" style="top: 20%; right: 15%; font-size: 1.5rem; animation-delay: -2s;">👠</div>
        <div class="floating-element" style="bottom: 30%; left: 20%; font-size: 1.8rem; animation-delay: -4s;">👜</div>
        <div class="floating-element" style="bottom: 10%; right: 10%; font-size: 1.6rem; animation-delay: -1s;">💍</div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="logo">ALTERE</h1>
            <p class="tagline">Find the look. Not the price tag.</p>
        </div>

        <div class="camera-section">
            <div class="camera-container">
                <video id="camera" autoplay playsinline></video>
                <div class="camera-placeholder" id="placeholder">
                    <svg class="camera-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 15.2c1.65 0 3-1.35 3-3s-1.35-3-3-3-3 1.35-3 3 1.35 3 3 3zm0-4.2c.66 0 1.2.54 1.2 1.2s-.54 1.2-1.2 1.2-1.2-.54-1.2-1.2.54-1.2 1.2-1.2z"/>
                        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm11 15H4V6h16v11z"/>
                    </svg>
                    <p style="margin-bottom: 8px; font-weight: 500;">Ready to scan fashion items</p>
                    <p style="font-size: 14px; opacity: 0.7;">Point your camera at any clothing or accessory</p>
                </div>
            </div>
            
            <div class="capture-btn" id="captureBtn">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                    <circle cx="12" cy="12" r="8"/>
                </svg>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="startCamera">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 15.2c1.65 0 3-1.35 3-3s-1.35-3-3-3-3 1.35-3 3 1.35 3 3 3zm0-4.2c.66 0 1.2.54 1.2 1.2s-.54 1.2-1.2 1.2-1.2-.54-1.2-1.2.54-1.2 1.2-1.2z"/>
                        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm11 15H4V6h16v11z"/>
                    </svg>
                    Start Camera
                </button>
                <button class="btn btn-secondary" id="uploadBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                    </svg>
                    Upload Photo
                </button>
            </div>
            <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;">
        </div>

        <div class="results-section" id="resultsSection">
            <div class="loading" id="loadingState">
                <div class="loading-spinner"></div>
                <p>Finding similar items...</p>
            </div>
            <div id="resultsContent" class="hidden">
                <h3 style="margin-bottom: 20px; color: var(--text-primary);">Found these dupes:</h3>
                <div class="dupe-grid">
                    <div class="dupe-item">
                        <div class="dupe-image">Chanel Dupe</div>
                        <div class="price">€89</div>
                        <div class="brand">Zara</div>
                    </div>
                    <div class="dupe-item">
                        <div class="dupe-image">Similar Style</div>
                        <div class="price">€45</div>
                        <div class="brand">H&M</div>
                    </div>
                    <div class="dupe-item">
                        <div class="dupe-image">Budget Find</div>
                        <div class="price">€29</div>
                        <div class="brand">Primark</div>
                    </div>
                    <div class="dupe-item">
                        <div class="dupe-image">Designer Dupe</div>
                        <div class="price">€149</div>
                        <div class="brand">COS</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stream = null;
        let isCapturing = false;

        const camera = document.getElementById('camera');
        const placeholder = document.getElementById('placeholder');
        const captureBtn = document.getElementById('captureBtn');
        const startCameraBtn = document.getElementById('startCamera');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const resultsSection = document.getElementById('resultsSection');
        const loadingState = document.getElementById('loadingState');
        const resultsContent = document.getElementById('resultsContent');

        // Start camera
        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment', // Back camera on mobile
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                camera.srcObject = stream;
                camera.style.display = 'block';
                placeholder.style.display = 'none';
                startCameraBtn.textContent = 'Camera Active';
                startCameraBtn.style.background = 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)';
            } catch (error) {
                console.error('Camera access denied:', error);
                alert('Camera access is required to scan items. Please enable camera permissions and try again.');
            }
        }

        // Capture photo
        function capturePhoto() {
            if (!stream) {
                alert('Please start the camera first');
                return;
            }

            isCapturing = true;
            captureBtn.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                captureBtn.style.transform = 'scale(1)';
                
                // Create canvas to capture frame
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                
                context.drawImage(camera, 0, 0, canvas.width, canvas.height);
                
                // Convert to blob and analyze
                canvas.toBlob((blob) => {
                    analyzeImage(blob);
                }, 'image/jpeg', 0.8);
                
                isCapturing = false;
            }, 150);
        }

        // Upload photo
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                analyzeImage(file);
            }
        }

        // Analyze image (mock function - replace with real AI analysis)
        function analyzeImage(imageBlob) {
            resultsSection.style.display = 'block';
            loadingState.style.display = 'block';
            resultsContent.classList.add('hidden');
            
            // Scroll to results
            resultsSection.scrollIntoView({ behavior: 'smooth' });
            
            // Simulate AI processing time
            setTimeout(() => {
                loadingState.style.display = 'none';
                resultsContent.classList.remove('hidden');
                
                // Here you would integrate with actual AI image recognition
                // For now, we show mock results
                updateResults();
            }, 2000 + Math.random() * 1000);
        }

        // Update results with dynamic data
        function updateResults() {
            const mockResults = [
                { name: 'Designer Dupe', price: '€89', brand: 'Zara', match: '95%' },
                { name: 'Similar Style', price: '€45', brand: 'H&M', match: '87%' },
                { name: 'Budget Find', price: '€29', brand: 'Primark', match: '82%' },
                { name: 'Premium Alt', price: '€149', brand: 'COS', match: '91%' }
            ];

            const grid = document.querySelector('.dupe-grid');
            grid.innerHTML = mockResults.map(item => `
                <div class="dupe-item" onclick="openProduct('${item.brand}', '${item.name}')">
                    <div class="dupe-image">${item.match} Match</div>
                    <div class="price">${item.price}</div>
                    <div class="brand">${item.brand}</div>
                </div>
            `).join('');
        }

        // Open product (for affiliate links)
        function openProduct(brand, name) {
            // This is where you'd integrate affiliate links
            alert(`Opening ${brand} - ${name}\n\nThis would redirect to affiliate link in production.`);
        }

        // Event listeners
        startCameraBtn.addEventListener('click', startCamera);
        captureBtn.addEventListener('click', capturePhoto);
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileUpload);

        // Auto-start camera on mobile devices
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            // Auto-prompt for camera on mobile
            setTimeout(() => {
                if (window.location.protocol === 'https:' || window.location.hostname === 'localhost') {
                    startCamera();
                }
            }, 1000);
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
